name: Build Daily Video
on:
  schedule:
    - cron: "0 7 * *"   # 5 fields + quotes. 7:00 UTC = 9:00 Lagos
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install ffmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3
      - run: pip install pillow
      - run: python build.py
      - uses: actions/upload-artifact@v4
        with:
          name: daily-video
          path: out/*.mp4
